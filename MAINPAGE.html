button{

border-radius: 17px;
width:         196px;
height:        50px;

text-align:    center;

}


.vugicon {
    position: fixed;
    top: 0;
            right: 0;
    
    width: 30px;
    height: 30px;
    background-color: #4CAF50; /* Green */
    border-radius: 50%;
    display: flex;
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    top: 15px; 
    right: 15px;
    z-index: 9999;
}
@media (max-width: 600px) {
            .vugicon {
                width: 30px;
                height: 30px;
            }

            .vugicon img {
                width: 30px;
            }

}

    display: flex;
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
    top: 15px; 
    left: 15px;
    z-index: 9999;
}

.apk-button img {
    width: 35px; /* Adjust based on the APK symbol size */
    height: auto;
}
@media (max-width: 600px) {
            .apk-button {
                width: 30px;
                height: 30px;
            }

                width: 30px;
